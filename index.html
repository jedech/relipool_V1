<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { font-family: Arial; max-width: 800px; margin: auto; }
  .card { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
  img { max-width: 100%; }
  .meta { color: #666; font-size: 0.9em; }
</style>
</head>

<body>
<h1>Bildungsmedien</h1>
<div id="content"></div>

<script type="module">
import { nip19 } from "https://esm.sh/nostr-tools";

const authorsNpub = [
  "e8dd80cf88e107309cbbb995fae472574f795f34c8f843cf6fad94e6906201ad",
  "9b1d54456e3613f220d01673bda10a5035cc9d36bf3aa5382e991203ee5d9ecb"
  "1r30l8j4vmppvq8w23umcyvd3vct4zmfpfkn4c7h2h057rmlfcrmq9xt9ma"
];
  
const relays = [
  "wss://amb-relay.edufeed.org",
  "wss://relay.edufeed.org",
  "wss://relay-rpi.edufeed.org",
];

const seenEvents = new Set();
let events = [];

  function toHex(npub) {
  try {
    const { data } = nip19.decode(npub);
    return data;
  } catch (e) {
    console.error("Ungültiger npub:", npub);
    return null;
  }
}

const authorsHex = authorsNpub
  .map(toHex)
  .filter(a => a !== null);

  console.log("authorsHex:", authorsHex);

const filter = {
  kinds: [30023],
  authors: authorsHex,
  limit: 20
};

relays.forEach(url => {
  const ws = new WebSocket(url);

  ws.onopen = () => {
    ws.send(JSON.stringify([
      "REQ",
      url,
      filter
    ]));
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data[0] === "EVENT") {
      const ev = data[2];

      // ✅ clientseitiger Filter
      if (ev.kind !== 30023) return;

      // ✅ Filter auf die richtigen npubs
      if (!authorsHex.includes(ev.pubkey)) return;

      // ✅ Duplikate vermeiden
      if (seenEvents.has(ev.id)) return;
      seenEvents.add(ev.id);

      events.push(ev);
      render();
    }
  };
});

function render() {
  const div = document.getElementById("content");
  div.innerHTML = "";

  // ✅ nach Autor sortieren (pubkey)
  events.sort((a, b) => a.pubkey.localeCompare(b.pubkey));

  events.forEach(ev => {
    const title = getTag(ev, "title") || "Ohne Titel";
    const summary = getTag(ev, "summary") || ev.content.slice(0, 200);
    const image = getTag(ev, "image");
    const author = toNpub(ev.pubkey);

    const el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
      <h2>${title}</h2>
      <div class="meta">
           Autor: <a href="https://njump.me/${author}" target="_blank">${author}</a>
      </div>
      ${image ? `<img src="${image}">` : ""}
      <p>${summary}</p>
    `;

    div.appendChild(el);
  });
}

function getTag(ev, tagName) {
  const tag = ev.tags.find(t => t[0] === tagName);
  return tag ? tag[1] : null;
}

  function toNpub(pubkey) {
  try {
    return nip19.npubEncode(pubkey);
  } catch (e) {
    return pubkey; // fallback
  }
}

  
</script>

</body>
</html>
