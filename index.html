<!DOCTYPE html>
<html lang="de">
<head>
  <!-- Style-Section bleibt gleich -->
</head>
<body>
  <!-- HTML-Struktur bleibt gleich -->

  <script type="module">
    import { nip19 } from "https://esm.sh/nostr-tools";
    import marked from "https://esm.sh/marked@10.0.0";

    // === Konfiguration ===
    const authorsNpub = [
      "npub1nvw4g3twxcflygxszeemmgg22q6ue8fkhua22wpwnyfq8mjanm9s6vj992",
      "npub1r30l8j4vmppvq8w23umcyvd3vct4zmfpfkn4c7h2h057rmlfcrmq9xt9ma",
      "npub1arwcpnuguyrnp89mhx2l4erj2a8hjhe5eruy8nm04k2wdyrzqxksf0mu63"
    ];

    const relays = [
      "wss://amb-relay.edufeed.org",
      "wss://relay.edufeed.org",
      "wss://relay-rpi.edufeed.org"
    ];

    // === Zustand ===
    const seenEvents = new Set();
    const events = [];

    // === Hilfsfunktionen ===
    function getTag(ev, tagName) {
      const tag = ev.tags.find(t => t[0] === tagName);
      return tag ? tag[1] : null;
    }

    function getTitle(ev) {
      let title = getTag(ev, "title");
      if (title) return title;

      title = getTag(ev, "name");
      if (title) return title;

      return "Ohne Titel";
    }

    function toHex(npub) {
      try {
        let normalized = npub;
        if (npub.length === 64 && (npub.startsWith('1nvw') || npub.startsWith('1r30') || npub.startsWith('1arw'))) {
          normalized = 'npub1' + npub;
        }

        const decoded = nip19.decode(normalized);
        if (decoded.type !== 'npub') {
          console.warn("Nicht ein npub:", npub, "Typ:", decoded.type);
          return null;
        }
        return decoded.data;
      } catch (e) {
        console.error("Ungültiger npub:", npub, e);
        return null;
      }
    }

    const authorsHex = authorsNpub
      .map(npub => {
        try {
          let normalized = npub;
          if (npub.length === 64 && (npub.startsWith('1nvw') || npub.startsWith('1r30') || npub.startsWith('1arw'))) {
            normalized = 'npub1' + npub;
          }
          const decoded = nip19.decode(normalized);
          if (decoded.type !== 'npub') {
            throw new Error("Ungültiger npub");
          }
          return decoded.data;
        } catch (e) {
          console.error("Ungültiger npub:", npub, e);
          return null;
        }
      })
      .filter(a => a !== null);

    console.log("authorsHex:", authorsHex);
    if (authorsHex.length === 0) {
      console.error("Keine gültigen npub-Adressen gefunden!");
    }

    const filter = {
      kinds: [30023, 30142],
      authors: authorsHex,
      limit: 20
    };

    // === Modal-Elemente ===
    const modal = document.getElementById("modal");
    const modalTitle = document.getElementById("modal-title");
    const modalBody = document.getElementById("modal-body");
    const modalFooter = document.getElementById("modal-footer");
    const closeModalBtn = document.getElementById("close-modal");

    // === Öffnen des Modals ===
    function openModal(ev) {
      modalTitle.textContent = getTitle(ev) || "Ohne Titel";
      modalBody.innerHTML = marked.parse(ev.content || "Kein Inhalt verfügbar.");
      modalFooter.innerHTML = `
        <span>Typ: ${ev.kind}</span> • 
        <span>Veröffentlicht: ${new Date(ev.created_at * 1000).toLocaleString()}</span>
      `;
      modal.classList.add("active");
      document.body.style.overflow = "hidden";
    }

    // === Schließen des Modals ===
    function closeModal() {
      modal.classList.remove("active");
      document.body.style.overflow = "";
    }

    // === Event-Listener für Modal ===
    closeModalBtn.addEventListener("click", closeModal);
    modal.addEventListener("click", (e) => {
      if (e.target === modal) closeModal();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && modal.classList.contains("active")) {
        closeModal();
      }
    });

    // === Render-Funktion mit Gruppierung und anklickbaren Events ===
    let renderTimeout;

    function render() {
      clearTimeout(renderTimeout);
      renderTimeout = setTimeout(() => {
        const div = document.getElementById("content");
        div.innerHTML = "";

        const groupedEvents = new Map();

        events.forEach(ev => {
          let pubkey = ev.pubkey;
          if (pubkey.length === 64 && (pubkey.startsWith('1nvw') || pubkey.startsWith('1r30') || pubkey.startsWith('1arw'))) {
            pubkey = 'npub1' + pubkey;
          }

          if (!groupedEvents.has(pubkey)) {
            groupedEvents.set(pubkey, []);
          }
          groupedEvents.get(pubkey).push(ev);
        });

        const sortedGroups = Array.from(groupedEvents.entries()).sort(([a], [b]) => a.localeCompare(b));

        if (sortedGroups.length === 0) {
          div.innerHTML = `
            <div class="empty">
              <h3>Keine Medien gefunden</h3>
              <p>Überprüfen Sie Ihre Internetverbindung oder die Konfiguration.</p>
            </div>
          `;
          return;
        }

        sortedGroups.forEach(([pubkey, groupEvents]) => {
          const author = toNpub(pubkey);
          const groupEl = document.createElement("div");
          groupEl.className = "group";

          const headerEl = document.createElement("div");
          headerEl.className = "group-header";
          headerEl.innerHTML = `
            <a href="https://njump.me/${author}" target="_blank">${author}</a>
          `;
          groupEl.appendChild(headerEl);

          const sortedEvents = groupEvents.sort((a, b) => a.kind - b.kind);
          const kindGroups = new Map();

          sortedEvents.forEach(ev => {
            if (!kindGroups.has(ev.kind)) {
              kindGroups.set(ev.kind, []);
            }
            kindGroups.get(ev.kind).push(ev);
          });

          const kindOrder = [30023, 30142];
          kindOrder.forEach(kind => {
            if (!kindGroups.has(kind)) return;

            const kindEvents = kindGroups.get(kind);
            const kindHeader = document.createElement("div");
            kindHeader.className = "kind-header";
            kindHeader.textContent = `Typ: ${kind}`;
            groupEl.appendChild(kindHeader);

            kindEvents.forEach(ev => {
              const title = String(getTitle(ev) || "Ohne Titel");
              const summary = getTag(ev, "summary") || ev.content.slice(0, 200);
              const image = getTag(ev, "image");

              const cardEl = document.createElement("div");
              cardEl.className = "card";

              cardEl.innerHTML = `
                <h2>${title}</h2>
                <div class="meta">
                  <span class="kind">Typ: ${ev.kind}</span> • 
                  Veröffentlicht: ${new Date(ev.created_at * 1000).toLocaleString()}
                </div>
                ${image ? `<img src="${image}" alt="Bild">` : ""}
                <p>${summary}</p>
                <div style="margin-top: 10px;">
                  <button class="read-more-btn" data-id="${ev.id}">
                    Ganzen Beitrag lesen
                  </button>
                </div>
              `;

              const readMoreBtn = cardEl.querySelector(".read-more-btn");
              readMoreBtn.addEventListener("click", () => {
                openModal(ev);
              });

              groupEl.appendChild(cardEl);
            });
          });

          div.appendChild(groupEl);
        });
      }, 100);
    }

    // === WebSocket-Verbindungen ===
    relays.forEach(url => {
      const subId = `my-sub-${url}`;
      const ws = new WebSocket(url);

      ws.onopen = () => {
        console.log("Verbunden mit Relay:", url);
        ws.send(JSON.stringify([
          "REQ",
          subId,
          filter
        ]));
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        if (data[0] === "EVENT") {
          const ev = data[2];

          if (![30023, 30142].includes(ev.kind)) return;

          let pubkey = ev.pubkey;
          if (pubkey.length === 64 && (pubkey.startsWith('1nvw') || pubkey.startsWith('1r30') || pubkey.startsWith('1arw'))) {
            pubkey = 'npub1' + pubkey;
          }

          if (!authorsHex.includes(pubkey)) return;

          if (seenEvents.has(ev.id)) return;
          seenEvents.add(ev.id);

          events.push(ev);
          render();
        }
      };

      ws.onclose = () => {
        console.log("Verbindung zu Relay geschlossen:", url);
      };

      ws.onerror = (err) => {
        console.error("WebSocket-Fehler:", url, err);
      };
    });

    // === Initialisierung ===
    console.log("Client gestartet...");
    console.log("Relays:", relays);
    console.log("Filter:", filter);
  </script>
</body>
</html>
