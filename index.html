<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { font-family: Arial; max-width: 800px; margin: auto; }
  .card { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
  img { max-width: 100%; }
  .meta { color: #666; font-size: 0.9em; }
</style>
</head>

<body>
<h1>Bildungsmedien</h1>
<div id="content"></div>

<script>
const relays = [
  "wss://amb-relay.edufeed.org",
  "wss://relay.edufeed.org",
  "wss://relay-rpi.edufeed.org",
];

const seenEvents = new Set();
let events = [];

const filter = {
  kinds: [30023],
  limit: 20
};

relays.forEach(url => {
  const ws = new WebSocket(url);

  ws.onopen = () => {
    ws.send(JSON.stringify([
      "REQ",
      url,
      filter
    ]));
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data[0] === "EVENT") {
      const ev = data[2];

      // ✅ clientseitiger Filter
      if (ev.kind !== 30023) return;

      // ✅ Duplikate vermeiden
      if (seenEvents.has(ev.id)) return;
      seenEvents.add(ev.id);

      events.push(ev);
      render();
    }
  };
});

function render() {
  const div = document.getElementById("content");
  div.innerHTML = "";

  // ✅ nach Autor sortieren (pubkey)
  events.sort((a, b) => a.pubkey.localeCompare(b.pubkey));

  events.forEach(ev => {
    const title = getTag(ev, "title") || "Ohne Titel";
    const summary = getTag(ev, "summary") || ev.content.slice(0, 200);
    const image = getTag(ev, "image");
    const author = ev.pubkey;

    const el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
      <h2>${title}</h2>
      <div class="meta">Autor: ${author}</div>
      ${image ? `<img src="${image}">` : ""}
      <p>${summary}</p>
    `;

    div.appendChild(el);
  });
}

function getTag(ev, tagName) {
  const tag = ev.tags.find(t => t[0] === tagName);
  return tag ? tag[1] : null;
}
</script>

</body>
</html>
