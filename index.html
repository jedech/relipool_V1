<!DOCTYPE html>
<html>
<body>
<h1>Bildungsmedien</h1>
<div id="content"></div>

<script>
const relays = [
  "wss://amb-relay.edufeed.org",
  "wss://relay-rpi.edufeed.org",
  "wss://relay.damus.io"
];

const seenEvents = new Set(); // verhindert Duplikate

const filter = {
  kinds: [30023],
  limit: 15
};

relays.forEach(url => {
  const ws = new WebSocket(url);

  ws.onopen = () => {
    console.log("Verbunden mit", url);

    ws.send(JSON.stringify([
      "REQ",
      url,   // subId (einfach Relay-URL nehmen)
      filter
    ]));
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data[0] === "EVENT") {
      const ev = data[2];

      // ❗ Duplikate vermeiden
      if (seenEvents.has(ev.id)) return;
      seenEvents.add(ev.id);

      renderEvent(ev);
    }

    if (data[0] === "EOSE") {
      console.log("Fertig:", url);
      ws.close();
    }
  };

  ws.onerror = (e) => {
    console.log("Fehler bei", url);
  };
});

function renderEvent(ev) {
  const div = document.getElementById("content");
  const el = document.createElement("div");

  el.innerHTML = `
    <h2>${getTag(ev, "title") || "Ohne Titel"}</h2>
    <p>${ev.content}</p>
    <hr>
  `;

  div.appendChild(el);
}

function getTag(ev, tagName) {
  const tag = ev.tags.find(t => t[0] === tagName);
  return tag ? tag[1] : null;
}
</script>

</body>
</html>
