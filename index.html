<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bildungsmedien</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 800px;
  margin: auto;
  padding: 20px;
  background-color: #f9f9f9;
  color: #333;
}

h1 {
  text-align: center;
}

.group {
  margin-bottom: 30px;
  border-bottom: 2px solid #eee;
}

.group-header {
  font-weight: bold;
  margin-bottom: 10px;
}

.card {
  border: 1px solid #ddd;
  padding: 15px;
  margin: 10px 0;
  border-radius: 8px;
  background-color: #fff;
}

.read-more-btn {
  margin-top: 10px;
  padding: 6px 12px;
  cursor: pointer;
}

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  background: rgba(0,0,0,0.7);
}

.modal.active {
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-content {
  background: white;
  padding: 20px;
  max-width: 800px;
  width: 90%;
}
</style>
</head>

<body>

<h1>Bildungsmedien</h1>
<div id="content"></div>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h2 id="modal-title"></h2>
    <div id="modal-body"></div>
    <button id="close-modal">Schließen</button>
  </div>
</div>

<script type="module">
import { nip19 } from "https://esm.sh/nostr-tools";

/* =====================
   KONFIGURATION
===================== */

const authorsNpub = [
  "npub1nvw4g3twxcflygxszeemmgg22q6ue8fkhua22wpwnyfq8mjanm9s6vj992",
  "npub1r30l8j4vmppvq8w23umcyvd3vct4zmfpfkn4c7h2h057rmlfcrmq9xt9ma",
  "npub1arwcpnuguyrnp89mhx2l4erj2a8hjhe5eruy8nm04k2wdyrzqxksf0mu63"
];

const relays = [
  "wss://amb-relay.edufeed.org",
  "wss://relay.edufeed.org",
  "wss://relay-rpi.edufeed.org"
];

/* =====================
   STATE
===================== */

const events = [];
const seenEvents = new Set();
const profiles = new Map();

/* =====================
   HELFER
===================== */

function toHex(npub) {
  try {
    const decoded = nip19.decode(npub);
    return decoded.type === "npub" ? decoded.data : null;
  } catch {
    return null;
  }
}

function toNpub(hex) {
  try {
    return nip19.npubEncode(hex);
  } catch {
    return hex;
  }
}

function getTag(ev, name) {
  const t = ev.tags.find(t => t[0] === name);
  return t ? t[1] : null;
}

const authorsHex = authorsNpub.map(toHex).filter(Boolean);

/* =====================
   MODAL
===================== */

const modal = document.getElementById("modal");
const modalTitle = document.getElementById("modal-title");
const modalBody = document.getElementById("modal-body");

function openModal(ev) {
  modalTitle.textContent =
    getTag(ev, "title") ||
    getTag(ev, "name") ||
    "Ohne Titel";

  modalBody.textContent = ev.content;

  modal.classList.add("active");
}

document.getElementById("close-modal").onclick = () => {
  modal.classList.remove("active");
};

/* =====================
   RENDER
===================== */

function render() {
  const container = document.getElementById("content");
  container.innerHTML = "";

  const grouped = new Map();

  events.forEach(ev => {
    if (!grouped.has(ev.pubkey)) {
      grouped.set(ev.pubkey, []);
    }
    grouped.get(ev.pubkey).push(ev);
  });

  grouped.forEach((list, pubkey) => {
    const npub = toNpub(pubkey);
    const profile = profiles.get(pubkey);

    const name =
      profile?.display_name ||
      profile?.name ||
      npub;

    const groupEl = document.createElement("div");
    groupEl.className = "group";

    const header = document.createElement("div");
    header.className = "group-header";
    header.innerHTML = `
      <a href="https://njump.me/${npub}" target="_blank">
        ${name}
      </a>
    `;
    groupEl.appendChild(header);

    list.forEach(ev => {

      console.log("TITLE TEST:",
        getTag(ev, "title"),
        getTag(ev, "name")
      );

      const title =
        getTag(ev, "title") ||
        getTag(ev, "name") ||
        "Ohne Titel";

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <h2>${title}</h2>
        <p>${ev.content.slice(0, 150)}...</p>
        <button class="read-more-btn">Ganzen Beitrag lesen</button>
      `;

      card.querySelector("button").onclick = () => openModal(ev);

      groupEl.appendChild(card);
    });

    container.appendChild(groupEl);
  });
}

/* =====================
   WEBSOCKET
===================== */

const filter = {
  kinds: [30023, 30142],
  authors: authorsHex,
  limit: 20
};

const profileFilter = {
  kinds: [0],
  authors: authorsHex
};

relays.forEach(url => {

  const ws = new WebSocket(url);

  ws.onopen = () => {
    console.log("Relay verbunden:", url);

    ws.send(JSON.stringify(["REQ", "events", filter]));
    ws.send(JSON.stringify(["REQ", "profiles", profileFilter]));
  };

  ws.onmessage = (msg) => {
    const data = JSON.parse(msg.data);

    if (data[0] !== "EVENT") return;

    const ev = data[2];

    /* === PROFILE === */
    if (ev.kind === 0) {
      try {
        profiles.set(ev.pubkey, JSON.parse(ev.content));
        render();
      } catch {}
      return;
    }

    /* === EVENTS === */
    if (![30023, 30142].includes(ev.kind)) return;
    if (!authorsHex.includes(ev.pubkey)) return;
    if (seenEvents.has(ev.id)) return;

    seenEvents.add(ev.id);
    events.push(ev);

    render();
  };

  ws.onerror = err => console.error("WS Fehler:", err);
});
</script>

</body>
</html>
